# https://taskfile.dev

version: "3"

vars:
  GREETING: Hello, World!

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  test:
    cmds:
      - go test -v ./...

  "install:file-guard":
    cmds:
      - cd file-guard && go install
      - file-guard --version
      - echo "file-guard installed successfully."
